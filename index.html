<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicho Gon - Pet Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1 class="game-title">HUNTER PET</h1>
        
        <div class="stage">
            <img id="bicho" src="killua.png" alt="Meu Bicho">
        </div>

        <div class="ui-controls">
            <div class="btn-wrapper">
                <img id="btn-alimentar" src="btn.png" onclick="alimentar()" alt="Alimentar">
                <span>ALIMENTAR</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
